<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テスト会社 - 公式サイト</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0f172a;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --border: rgba(99, 102, 241, 0.2);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== NAVBAR ===== */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }

    .nav-logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .nav-logo span {
      color: var(--accent-light);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-cta {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.55rem 1.4rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .nav-cta:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      padding: 8rem 2rem 4rem;
      overflow: hidden;
    }

    /* 背景のグラデーションメッシュ */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99, 102, 241, 0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(129, 140, 248, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    /* 浮遊する光の粒子 */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.15;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.15; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 760px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      color: var(--accent-light);
      margin-bottom: 1.8rem;
      letter-spacing: 0.05em;
    }

    .hero-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-light);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    .hero h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    .hero h1 .gradient-text {
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.15rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 2.5rem;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 0 0 0 var(--accent-glow);
    }

    .btn-primary:hover {
      background: var(--accent-light);
      box-shadow: 0 0 20px var(--accent-glow);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--accent-light);
      background: rgba(99, 102, 241, 0.08);
      transform: translateY(-2px);
    }

    /* スクロールインジケーター */
    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      opacity: 0.6;
    }

    .scroll-arrow {
      width: 18px;
      height: 18px;
      border-right: 2px solid var(--text-muted);
      border-bottom: 2px solid var(--text-muted);
      transform: rotate(45deg);
      animation: bounce 1.4s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50%       { transform: rotate(45deg) translateY(5px); }
    }

    /* ===== STATS ===== */
    .stats {
      padding: 5rem 2rem;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stats-grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 2rem;
      text-align: center;
    }

    .stat-item h3 {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--accent-light);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .stat-item p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ===== ABOUT ===== */
    .about {
      padding: 6rem 2rem;
      background: var(--bg);
    }

    .about-inner {
      max-width: 800px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 1rem;
    }

    .about h2 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      margin-bottom: 3rem;
      line-height: 1.2;
    }

    .about-table {
      width: 100%;
      border-collapse: collapse;
    }

    .about-table tr {
      border-bottom: 1px solid var(--border);
    }

    .about-table tr:first-child {
      border-top: 1px solid var(--border);
    }

    .about-table th {
      width: 160px;
      padding: 1.4rem 1rem 1.4rem 0;
      text-align: left;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent-light);
      vertical-align: top;
      white-space: nowrap;
    }

    .about-table td {
      padding: 1.4rem 0;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .about-table th,
      .about-table td {
        display: block;
        width: 100%;
        padding: 0.5rem 0;
      }
      .about-table tr {
        padding: 1rem 0;
        display: block;
      }
      .about-table th {
        font-size: 0.78rem;
        color: var(--accent-light);
        padding-top: 1rem;
      }
    }

    /* ===== FOOTER ===== */
    footer {
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .hero h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <!-- ナビゲーション -->
  <nav>
    <div class="nav-logo">テスト<span>会社</span></div>
    <ul class="nav-links">
      <li><a href="#">ホーム</a></li>
      <li><a href="#">サービス</a></li>
      <li><a href="#about">会社概要</a></li>
    </ul>
    <button class="nav-cta">お問い合わせ</button>
  </nav>

  <!-- ヒーローセクション -->
  <section class="hero">
    <!-- パーティクル -->
    <div class="particles" id="particles"></div>

    <div class="hero-content">
      <div class="hero-badge">新しいビジネスの可能性を、ともに</div>

      <h1>
        未来をつくる<br />
        <span class="gradient-text">テクノロジーと信頼</span>
      </h1>

      <p>
        テスト会社は、最先端の技術と深い専門知識で<br />
        お客様のビジネスの成長をトータルサポートします。
      </p>

      <div class="hero-buttons">
        <button class="btn-primary">サービスを見る</button>
        <button class="btn-secondary">会社概要</button>
      </div>
    </div>

    <div class="scroll-indicator">
      SCROLL
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- 実績数字 -->
  <section class="stats">
    <div class="stats-grid">
      <div class="stat-item">
        <h3>500<span style="font-size:1.5rem">+</span></h3>
        <p>導入企業数</p>
      </div>
      <div class="stat-item">
        <h3>98<span style="font-size:1.5rem">%</span></h3>
        <p>顧客満足度</p>
      </div>
      <div class="stat-item">
        <h3>10<span style="font-size:1.5rem">年</span></h3>
        <p>業界経験</p>
      </div>
      <div class="stat-item">
        <h3>24<span style="font-size:1rem">/</span>7</h3>
        <p>サポート対応</p>
      </div>
    </div>
  </section>

  <!-- 会社概要 -->
  <section class="about" id="about">
    <div class="about-inner">
      <span class="section-label">About Us</span>
      <h2>会社概要</h2>
      <table class="about-table">
        <tr>
          <th>会社名</th>
          <td>テスト会社</td>
        </tr>
        <tr>
          <th>住所</th>
          <td>日本のどこか？</td>
        </tr>
        <tr>
          <th>サービス内容</th>
          <td>ビジネスのお困りごとをAIで解決</td>
        </tr>
      </table>
    </div>
  </section>

  <!-- フッター -->
  <footer>
    <p>&copy; 2026 テスト会社. All rights reserved.</p>
  </footer>

  <script>
    // パーティクル生成
    const container = document.getElementById('particles');
    const count = 18;

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 2;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 10}s;
      `;
      container.appendChild(p);
    }

    // ナビのスクロール時背景強化
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('nav');
      nav.style.background = window.scrollY > 40
        ? 'rgba(15, 23, 42, 0.97)'
        : 'rgba(15, 23, 42, 0.8)';
    });

    // 数字カウントアップアニメーション
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.querySelectorAll('h3').forEach(el => {
          const text = el.textContent;
          const num = parseInt(text);
          if (isNaN(num)) return;
          let start = 0;
          const duration = 1400;
          const step = (ts) => {
            if (!start) start = ts;
            const progress = Math.min((ts - start) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            el.firstChild.textContent = Math.floor(eased * num);
            if (progress < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        });
        observer.unobserve(entry.target);
      });
    }, { threshold: 0.4 });

    document.querySelectorAll('.stat-item').forEach(el => observer.observe(el));
  </script>

</body>
</html>
